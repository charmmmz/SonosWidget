# Charm for Sonos NAS stack: Live Activity relay (Node) + LLM agent (Python).
# Copy `.env.stack.example` → `.env` in this directory, fill in values, then:
#   docker compose up -d --build
#
# Requires `network_mode: host` for Sonos UPnP (same as nas-relay alone).

services:
  relay:
    build: ./nas-relay
    image: sonos-live-activity-relay:latest
    container_name: sonos-live-activity-relay
    restart: unless-stopped
    network_mode: host
    env_file: .env
    volumes:
      - ./nas-relay/data:/app/data

  agent:
    build: ./nas-agent
    image: sonos-nas-agent:latest
    container_name: sonos-nas-agent
    restart: unless-stopped
    network_mode: host
    env_file: .env
    volumes:
      - ./nas-agent/data:/app/data
    depends_on:
      - relay
