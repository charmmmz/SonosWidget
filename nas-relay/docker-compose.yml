# Sonos Live Activity Relay — for QNAP Container Station via Portainer Stacks.
#
# Why network_mode: host?
#   Sonos UPnP eventing (GENA) requires the relay to expose a callback URL
#   that each Sonos device can POST events back to. In Docker bridge mode
#   we'd have to manually advertise the host's LAN IP + a NATed port; host
#   mode lets the lib auto-detect the interface and avoids that whole class
#   of "events stop firing after a while" headaches. SSDP multicast for
#   discovery also Just Works in host mode.
#
# To bring up:
#   1. cp .env.example .env  (then fill in the values)
#   2. docker login ghcr.io  (only needed for a private GHCR package)
#   3. docker compose pull && docker compose up -d
#   (or paste this file into Portainer → Stacks → New stack, attach the
#    .env content under "Environment variables".)

services:
  relay:
    image: ghcr.io/charmmmz/charm-for-sonos/nas-relay:latest
    pull_policy: always
    container_name: sonos-live-activity-relay
    init: true
    restart: unless-stopped
    network_mode: host
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RELAY_PORT: ${RELAY_PORT:-8787}
      DATA_DIR: ${DATA_DIR:-/app/data}

      # Sonos — provide a single speaker IP and the lib enumerates the rest
      # via ZoneGroupTopology. Pick any always-on speaker on your network.
      SONOS_SEED_IP: ${SONOS_SEED_IP}

      # Shared secret for `/internal/*` (Python agent). Optional if you don't run nas-agent.
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-}

      # Hue Ambience — the iOS app uploads the actual Bridge app key and
      # assignments to this file through /api/hue-ambience/config.
      HUE_AMBIENCE_ENABLED: ${HUE_AMBIENCE_ENABLED:-true}
      HUE_AMBIENCE_CONFIG_PATH: ${HUE_AMBIENCE_CONFIG_PATH:-/app/data/hue-ambience-config.json}
      # Optional override. Leave blank to use the Light Motion Speed selected
      # in the iOS app. Lower values move faster; examples: 8, 6, 4.
      HUE_FLOW_INTERVAL_SECONDS: ${HUE_FLOW_INTERVAL_SECONDS:-}

      # APNs — leave blank during initial setup; the relay runs in dry-run
      # mode and just logs the payloads it *would* have sent. Fill these in
      # once you have your Apple Developer .p8 key.
      APNS_BUNDLE_ID: ${APNS_BUNDLE_ID:-com.charm.SonosWidget}
      APNS_KEY_PATH: ${APNS_KEY_PATH:-/app/data/apns.p8}
      APNS_KEY_ID: ${APNS_KEY_ID:-}
      APNS_TEAM_ID: ${APNS_TEAM_ID:-}
      # Use the sandbox APNs endpoint for development builds (Xcode-signed),
      # flip to "true" only after you ship a TestFlight / App Store build.
      APNS_PRODUCTION: ${APNS_PRODUCTION:-false}

    volumes:
      # tokens.json, apns.p8, and hue-ambience-config.json live here.
      # Don't bake secrets into the image.
      - ./data:/app/data
